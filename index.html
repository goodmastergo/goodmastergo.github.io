<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Kalyan Master</title>
    <meta name="description" content="Welcome to Kalyan Master.">
    
    <!-- Google Fonts & Font Awesome Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="logo.webp" type="image/png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #fefce8;
        }

        /* ===== MAIN LANDING PAGE CONTAINER ===== */
        .landing-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: 
                radial-gradient(circle at 10% 10%, rgba(253, 224, 71, 0.25) 0%, transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(250, 204, 21, 0.25) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(254, 240, 138, 0.3) 0%, transparent 70%),
                linear-gradient(180deg, #ffffff 0%, #fffbeb 50%, #fef08a 100%);
            position: relative;
        }

        /* Decorative background elements */
        .bg-deco-circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(234, 179, 8, 0.15);
            pointer-events: none;
        }

        .deco-1 { width: 300px; height: 300px; top: -50px; left: -100px; }
        .deco-2 { width: 400px; height: 400px; bottom: -100px; right: -100px; }

        .landing-content {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        /* ===== LOGO DISPLAY ===== */
        .logo-container {
            width: 100%;
            max-width: 320px;
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            width: 100%;
            max-width: 290px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 15px 35px rgba(234, 179, 8, 0.3));
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.03);
        }

        /* ===== ACTION BUTTONS CONTAINER ===== */
        .actions-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* BUTTON 1: DOWNLOAD APP (GOLDEN) */
        .btn-download-gold {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            padding: 20px 24px;
            border-radius: 24px;
            background: linear-gradient(180deg, #fde047 0%, #eab308 50%, #ca8a04 100%);
            color: #1e1b4b;
            font-size: 20px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 12px 30px rgba(234, 179, 8, 0.45), inset 0 2px 2px rgba(255, 255, 255, 0.8);
            border: 2.5px solid #ffffff;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-download-gold i {
            font-size: 24px;
            color: #713f12;
        }

        .btn-download-gold:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 18px 40px rgba(234, 179, 8, 0.6);
        }

        .btn-download-gold:active {
            transform: translateY(1px);
        }

        /* BUTTON 2: WHATSAPP US (GREEN) */
        .btn-whatsapp-green {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            padding: 20px 24px;
            border-radius: 24px;
            background: linear-gradient(180deg, #4ade80 0%, #22c55e 50%, #16a34a 100%);
            color: #ffffff;
            font-size: 20px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 12px 30px rgba(34, 197, 94, 0.4), inset 0 2px 2px rgba(255, 255, 255, 0.5);
            border: 2.5px solid #ffffff;
            transition: all 0.3s ease;
        }

        .btn-whatsapp-green i {
            font-size: 28px;
        }

        .btn-whatsapp-green:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 18px 40px rgba(34, 197, 94, 0.55);
        }

        .btn-whatsapp-green:active {
            transform: translateY(1px);
        }

        /* CARD 3: SAFE & SECURE TRUST CARD */
        .trust-card {
            background: #ffffff;
            border: 2px solid #fef08a;
            border-radius: 24px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(234, 179, 8, 0.15);
            width: 100%;
            transition: all 0.3s ease;
        }

        .trust-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(234, 179, 8, 0.22);
            border-color: #facc15;
        }

        .laurel-leaf {
            color: #eab308;
            font-size: 22px;
            opacity: 0.85;
        }

        .trust-center-content {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .shield-badge {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fef08a, #eab308);
            color: #713f12;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(234, 179, 8, 0.35);
            flex-shrink: 0;
        }

        .trust-text {
            text-align: left;
        }

        .trust-title {
            font-family: 'Outfit', sans-serif;
            font-size: 17px;
            font-weight: 900;
            color: #0f172a;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .trust-subtitle {
            font-size: 11px;
            font-weight: 700;
            color: #ca8a04;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* ===== SECONDARY SECTIONS (COLLAPSIBLE / BELOW LANDING) ===== */
        .details-toggle-wrap {
            margin-top: 35px;
            text-align: center;
        }

        .btn-view-details {
            background: rgba(234, 179, 8, 0.12);
            color: #a16207;
            border: 1px solid rgba(234, 179, 8, 0.3);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-view-details:hover {
            background: rgba(234, 179, 8, 0.2);
            color: #713f12;
        }

        /* MEDIA QUERIES FOR EXTRA SMALL MOBILE SCREENS */
        @media (max-width: 380px) {
            .landing-wrapper {
                padding: 30px 14px;
            }
            .btn-download-gold, .btn-whatsapp-green {
                font-size: 18px;
                padding: 16px 18px;
            }
            .trust-title {
                font-size: 15px;
            }
            .trust-subtitle {
                font-size: 10px;
            }
            .shield-badge {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- MAIN CLEAN LANDING PAGE -->
    <main class="landing-wrapper">
        <div class="bg-deco-circle deco-1"></div>
        <div class="bg-deco-circle deco-2"></div>

        <div class="landing-content">
            
            <!-- CENTRAL LOGO -->
            <div class="logo-container">
                <img src="logo.webp" alt="Kalyan Master Logo">
            </div>

            <!-- ACTION BUTTONS & TRUST CARD -->
            <div class="actions-group">
                
                <!-- 1. DOWNLOAD APP BUTTON -->
                <a href="KalyanMaster.apk" class="btn-download-gold">
                    <i class="fas fa-download"></i>
                    <span>DOWNLOAD APP</span>
                </a>

                <!-- 2. WHATSAPP US BUTTON -->
                <a href="https://wa.me/919610232013?text=Welcome+To+Kalyan+Master" target="_blank" class="btn-whatsapp-green">
                    <i class="fab fa-whatsapp"></i>
                    <span>WHATSAPP US</span>
                </a>

                <!-- 3. SAFE & SECURE CARD -->
                <div class="trust-card">
                    <i class="fas fa-award laurel-leaf"></i>
                    <div class="trust-center-content">
                        <div class="shield-badge">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <div class="trust-text">
                            <div class="trust-title">SAFE &amp; SECURE</div>
                            <div class="trust-subtitle">YOUR SAFETY, OUR PRIORITY</div>
                        </div>
                    </div>
                    <i class="fas fa-award laurel-leaf"></i>
                </div>

            </div>

        </div>
    </main>

</body>
</html>
